# Game Wire 週刊ビルド・デプロイワークフロー
# 毎週土曜日 AM 6:00 (JST) に自動実行

name: Weekly Build and Deploy

on:
  # 定期実行: 毎週土曜日 AM 6:00 JST (= 金曜日 UTC 21:00)
  schedule:
    - cron: '0 21 * * 5'

  # 手動実行も可能
  workflow_dispatch:
    inputs:
      publish_date:
        description: '発行日 (YYYY-MM-DD形式、空欄で当日)'
        required: false
        type: string

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write

    steps:
      # 1. リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js をセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 依存関係をインストール
      - name: Install dependencies
        run: npm ci

      # 4. データ取得（Steam, YouTube, IGDB, Metacritic）+ 公式日本語URL取得
      - name: Fetch game data
        run: npm run fetch-data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          BEDROCK_MODEL_ID: ${{ secrets.BEDROCK_MODEL_ID }}

      # 5. 記事生成（Bedrock Claude + 画像生成 + Web検索 + IGDB画像取得）
      - name: Generate articles
        run: npm run generate
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          PUBLISH_DATE: ${{ inputs.publish_date }}

      # 6. 号を組み立て
      - name: Build issue
        run: npx tsx scripts/build-issue.ts
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      # 6.5. バリデーションレポートを Job Summary に出力
      #      整形は scripts/format-validation-report.ts が生成する .md をそのまま利用する
      - name: Validation report summary
        if: always()
        run: |
          REPORT_MD=$(ls data/validation/validation-report-*.md 2>/dev/null | sort | tail -1)
          if [ -z "$REPORT_MD" ]; then
            echo "## ⚠️ Article Validation Report" >> "$GITHUB_STEP_SUMMARY"
            echo "レポートファイルが見つかりませんでした。" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          cat "$REPORT_MD" >> "$GITHUB_STEP_SUMMARY"

      # 6.6. history.json の JSON 整合性チェック
      - name: Validate history.json
        run: jq empty src/content/history.json

      # 7. 生成した記事をコミット＆プッシュ
      - name: Commit and push generated content
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/issues/ src/content/history.json
          [ -d "public/images/features" ] && git add public/images/features/ || true
          # 本番 validation レポート（JSON=調査用 / Markdown=人間向け）をリポジトリに保存（Issue #202）
          [ -d "data/validation" ] && git add data/validation/ || true
          git diff --staged --quiet || git commit -m "Add issue for $(date '+%Y-%m-%d')"
          git stash --include-untracked || true
          git pull --rebase origin main
          git stash pop || true
          jq empty src/content/history.json
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7.5. 総合ステータスが error の号は Issue を自動起票（既存があればスキップ）
      #      Commit and push 成功後のみ実行（レポートがリポジトリに保存済みであることを保証）
      - name: File issue on validation error
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -e
          REPORT_JSON=$(ls data/validation/validation-report-*.json 2>/dev/null | sort | tail -1)
          if [ -z "$REPORT_JSON" ]; then
            echo "レポート JSON が見つからないため起票をスキップします。"
            exit 0
          fi

          STATUS=$(jq -r '.status // "ok"' "$REPORT_JSON")
          if [ "$STATUS" != "error" ]; then
            echo "status=${STATUS} のため起票不要です。"
            exit 0
          fi

          ISSUE_NUM=$(jq -r '.issueNumber' "$REPORT_JSON")
          HIGH=$(jq -r '.warningsBySeverity.high' "$REPORT_JSON")
          TITLE="⚠️ 第${ISSUE_NUM}号 検証で要対応の問題（HIGH: ${HIGH}件）"

          # 同一タイトルのオープン Issue が既にあれば起票しない（重複防止）。
          # GitHub 検索インデックスは即時反映されないため、全件取得してローカルで完全一致フィルタする。
          EXISTING=$(gh issue list --state all --limit 100 --json title \
            --jq "[.[] | select(.title == \"${TITLE}\")] | length")
          if [ "$EXISTING" != "0" ]; then
            echo "既存の Issue があるため起票をスキップします: ${TITLE}"
            exit 0
          fi

          # F1: validation ラベルを冪等に作成（存在しなければ作る、あれば何もしない）
          gh label create validation --description "Validation report issue" --color "e11d48" --force || true

          REPORT_MD=$(ls data/validation/validation-report-*.md 2>/dev/null | sort | tail -1)
          {
            cat "$REPORT_MD"
            echo ""
            echo "---"
            echo "調査用の詳細レポート: \`${REPORT_JSON}\`（main ブランチにコミット済みの場合はリポジトリから参照可能）"
            echo ""
            echo "🤖 このIssueは weekly-build ワークフローが自動起票しました。"
          } > /tmp/issue-body.md

          gh issue create --title "${TITLE}" --body-file /tmp/issue-body.md --label validation

      # 8. Astro ビルド
      - name: Build Astro site
        run: npm run build

      # 9. Cloudflare Pages にデプロイ
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=game-wire --commit-dirty=true

      # 11. 完了通知（サマリー）
      - name: Build summary
        run: |
          echo "## 🎮 Game Wire Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Publish Date**: ${{ inputs.publish_date || 'Today' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: Deployed to Cloudflare Pages" >> $GITHUB_STEP_SUMMARY
          REPORT=$(ls data/validation/validation-report-*.json 2>/dev/null | sort | tail -1)
          if [ -n "$REPORT" ]; then
            HIGH=$(jq '.warningsBySeverity.high' "$REPORT")
            TOTAL=$(jq '.totalWarnings' "$REPORT")
            STATUS=$(jq -r '.status // "ok"' "$REPORT")
            echo "- **Validation**: status=${STATUS} / 警告 ${TOTAL}件（HIGH: ${HIGH}件）" >> $GITHUB_STEP_SUMMARY
          fi
