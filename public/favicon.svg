<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="nv" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1628"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
    <linearGradient id="rd" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a8001e"/>
      <stop offset="50%" stop-color="#d4002a"/>
      <stop offset="100%" stop-color="#a8001e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="url(#nv)"/>
  <!-- Red band (taller for larger central logo) -->
  <rect x="0" y="18" width="100" height="64" fill="url(#rd)"/>
  <!-- Gold separator lines -->
  <rect x="0" y="17" width="100" height="1.5" fill="#c8a84b" opacity="0.8"/>
  <rect x="0" y="82" width="100" height="1.5" fill="#c8a84b" opacity="0.8"/>
  <!-- 新時代の (gold, top) -->
  <text x="50" y="12" font-size="8" font-family="'Hiragino Mincho ProN','Noto Serif JP',serif" font-weight="700" text-anchor="middle" fill="#c8a84b" letter-spacing="2">新時代の</text>
  <!-- 週刊 -->
  <text x="50" y="44" font-size="19" font-family="'Hiragino Mincho ProN','Noto Serif JP',serif" font-weight="700" text-anchor="middle" fill="#ffffff" letter-spacing="5">週刊</text>
  <!-- GAME WIRE (縦1.7倍スケール) -->
  <g transform="translate(0,68) scale(1,1.7) translate(0,-68)">
    <text x="50" y="68" font-size="13" font-family="Georgia,serif" font-weight="700" text-anchor="middle" fill="#ffffffcc" letter-spacing="1">GAME WIRE</text>
  </g>
  <!-- ゲーム情報誌 (white, bottom) -->
  <text x="50" y="94" font-size="7.5" font-family="'Hiragino Mincho ProN','Noto Serif JP',serif" font-weight="500" text-anchor="middle" fill="#ffffff" letter-spacing="2" opacity="0.9">ゲーム情報誌</text>
</svg>
